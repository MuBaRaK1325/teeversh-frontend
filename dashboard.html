<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>

<style>

/* THEMES */
:root{
--primary:#6c5ce7;
--bg:#050510;
--card:#0b0b2a;
--accent:#341f97;
}

body.teeversh{--primary:#6c5ce7;--bg:#050510;--card:#0b0b2a;}
body.bnhabeeb{--primary:gold;--bg:#1a1403;--card:#2c2105;}
body.sadeeq{--primary:#00c853;--bg:#02140a;--card:#063d1d;}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
display:none;
padding-bottom:120px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
}

/* WALLET */
.walletCard{
margin:20px;
padding:25px;
border-radius:20px;
text-align:center;
background:linear-gradient(135deg,var(--primary),var(--accent));
}

/* BUTTON */
button{
background:var(--primary);
border:none;
padding:12px;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
}

/* GRID */
.planGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

/* PLAN */
.planItem{
background:var(--card);
padding:10px;
border-radius:10px;
cursor:pointer;
}
.planItem.active{border:2px solid var(--primary)}

</style>
</head>

<body>

<header>
<h3 id="companyName"></h3>
<div onclick="showSection('profile')">👤</div>
</header>

<!-- HOME -->
<section id="home">
<h3 id="usernameDisplay"></h3>

<div class="walletCard">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<button onclick="showSection('fund')">💰 Fund</button>
<button onclick="showSection('data')">📶 Buy Data</button>

<div id="transactionHistory"></div>
</section>

<!-- FUND -->
<section id="fund" style="display:none">
<button onclick="showSection('home')">⬅ Close</button>

<p>Bank</p>
<strong id="bankName"></strong>

<p>Account</p>
<strong id="accountNumber"></strong>

<button onclick="copyAccount()">Copy</button>
</section>

<!-- DATA -->
<section id="data" style="display:none">
<button onclick="showSection('home')">⬅ Close</button>

<input id="dataPhone" placeholder="Phone">

<div id="networkList"></div>
<div id="planList" class="planGrid"></div>

<button onclick="openPinModal('data')">Buy Data</button>
<button onclick="confirmBiometric()">Use Fingerprint</button>
</section>

<!-- PROFILE -->
<section id="profile" style="display:none">
<button onclick="showSection('home')">⬅ Close</button>

<button onclick="toggleBiometric()">Toggle Biometric</button>
<button onclick="logout()">Logout</button>
</section>

<!-- PIN MODAL -->
<div id="pinModal" class="modal">
<div>
<input id="pinInput">
<button onclick="startProcessing()">Confirm</button>
</div>
</div>

<script src="app.js"></script>

<script>

/* THEME FIX */
const payload=JSON.parse(atob(localStorage.getItem("token").split(".")[1]))

document.body.classList.remove("teeversh","bnhabeeb","sadeeq")
document.body.classList.add(payload.company)

companyName.innerText={
teeversh:"TEEVERSH",
bnhabeeb:"BN HABEEB",
sadeeq:"SADEEQ"
}[payload.company]

/* NAV */
function showSection(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

/* PIN FLOW */
function openPinModal(type){
purchaseType=type
document.getElementById("pinModal").style.display="block"
}

function startProcessing(){
const pin=document.getElementById("pinInput").value
if(!pin) return alert("Enter PIN")

document.getElementById("pinModal").style.display="none"

if(purchaseType==="data") buyData(pin)
}

</script>

</body>
</html>
