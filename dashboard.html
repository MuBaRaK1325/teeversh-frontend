<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEEVERSH Dashboard</title>

<style>
:root{
--primary:#6c5ce7;
--bg:#050510;
--card:#0b0b2a;
--accent:#341f97;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
display:none;
}

/* header */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
}

.logo img{
width:60px;
border-radius:50%;
border:2px solid var(--primary);
}

/* wallet */
.wallet{
margin:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(135deg,var(--primary),var(--accent));
text-align:center;
}

/* networks */
.networks{
display:flex;
justify-content:space-around;
margin:15px;
}

.networks img{
width:60px;
cursor:pointer;
}

/* plans */
.plan{
background:var(--card);
margin:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* nav */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:var(--card);
}

/* modal */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000cc;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:var(--card);
padding:20px;
border-radius:10px;
width:85%;
}
</style>
</head>

<body>

<header>
<img src="images/TEEVERSH.png">
<h3>TEEVERSH</h3>
<div onclick="show('profile')">👤</div>
</header>

<section id="home">
<div class="wallet">
<h3 id="balance">₦0</h3>
</div>

<div class="networks">
<img src="images/mtn.png" onclick="selectNetwork('MTN')">
<img src="images/airtel.png" onclick="selectNetwork('AIRTEL')">
<img src="images/glo.png" onclick="selectNetwork('GLO')">
</div>

<div id="plans"></div>
</section>

<!-- FUND -->
<section id="fund" style="display:none">
<button onclick="show('home')">Back</button>
<div id="bank"></div>
</section>

<!-- PROFILE -->
<section id="profile" style="display:none">
<button onclick="openModal('password')">Change Password</button>
<button onclick="openModal('pin')">Change PIN</button>
<button onclick="toggleBiometric()">Toggle Biometrics</button>
<button onclick="logout()">Logout</button>
</section>

<!-- PIN MODAL -->
<div class="modal" id="pinModal">
<div class="box">
<input id="pinInput" placeholder="Enter PIN">
<button onclick="buy()">Confirm</button>
</div>
</div>

<!-- MESSAGE MODAL -->
<div class="modal" id="msgModal">
<div class="box" id="msgBox"></div>
</div>

<script src="app.js"></script>

<script>
let selectedNetwork=null
let selectedPlan=null

function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

/* NETWORK SELECT */
function selectNetwork(net){
selectedNetwork=net
renderPlans()
}

/* RENDER PLANS */
function renderPlans(){
const list=document.getElementById("plans")
list.innerHTML=""

cachedPlans
.filter(p=>p.network===selectedNetwork)
.forEach(p=>{
const div=document.createElement("div")
div.className="plan"
div.innerHTML=`${p.name} - ₦${p.price}`
div.onclick=()=>{selectedPlan=p.id;openModal('pinModal')}
list.appendChild(div)
})
}

/* BUY */
async function buy(){
const pin=document.getElementById("pinInput").value

const res=await fetch(API+"/api/buy-data",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({
plan_id:selectedPlan,
phone:"08000000000",
pin
})
})

const data=await res.json()

if(res.ok){
showMsg("✅ Success")
}else{
showMsg(data.message)
}
}

/* MODAL */
function openModal(id){document.getElementById(id).style.display="flex"}
function showMsg(msg){
document.getElementById("msgBox").innerText=msg
openModal("msgModal")
}
</script>

</body>
</html>
