<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAY Connect</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:none;
padding-bottom:90px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo img{
width:80px;
}

.walletCard{
margin:20px;
padding:20px;
border-radius:16px;
text-align:center;
background:linear-gradient(135deg,#3b78e7,#274ea3);
}

.walletCard strong{
font-size:30px;
}

.section{
display:none;
padding:20px;
}

.section.active{
display:block;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#3b78e7;
border:none;
padding:12px;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
}

.transactionCard{
background:#08142c;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#050b18;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.pinModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:5000;
}

.pinBox{
background:#0c1a36;
padding:20px;
border-radius:10px;
width:80%;
}

.adminCard{
background:#08142c;
padding:15px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="images/logo.png">
</div>

<div onclick="showSection('profile')">👤</div>

</header>

<!-- HOME -->

<section id="home" class="section active">

<div style="text-align:center">
<h3 id="usernameDisplay">Hello</h3>
</div>

<div class="walletCard">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<h3>Recent Transactions</h3>

<div id="transactionHistory"></div>

</section>

<!-- DATA -->

<section id="data" class="section">

<h2>Buy Data</h2>

<select id="networkSelect">
<option value="">Select Network</option>
<option value="MTN">MTN</option>
<option value="AIRTEL">Airtel</option>
<option value="GLO">Glo</option>
</select>

<input id="dataPhone" placeholder="Phone Number">

<select id="planSelect"></select>

<button onclick="openPinModal('data')">Buy Data</button>

</section>

<!-- AIRTIME -->

<section id="airtime" class="section">

<h2>Airtime</h2>

<div id="airtimeComing">

<p style="text-align:center">
Airtime service coming soon
</p>

</div>

<div id="airtimeForm" style="display:none">

<select id="airtimeNetwork">

<option>MTN</option>
<option>AIRTEL</option>
<option>GLO</option>

</select>

<input id="airtimePhone" placeholder="Phone Number">

<input id="airtimeAmount" placeholder="Amount">

<button onclick="openPinModal('airtime')">Buy Airtime</button>

</div>

</section>

<!-- FUND -->

<section id="fund" class="section">

<h2>Fund Wallet</h2>

<p>Virtual account will appear here once payment gateway is enabled.</p>

<div class="adminCard">

<p><b>Supported Gateway</b></p>

<p>Paystack (Coming Soon)</p>

</div>

</section>

<!-- TRANSACTIONS -->

<section id="transactions" class="section">

<h2>All Transactions</h2>

<div id="allTransactions"></div>

</section>

<!-- PROFILE -->

<section id="profile" class="section">

<h2>Account</h2>

<button onclick="changePassword()">Change Password</button>

<button onclick="changePin()">Change PIN</button>

<button onclick="toggleBiometric()">Toggle Biometrics</button>

<button onclick="logout()">Logout</button>

</section>

<!-- ADMIN -->

<section id="admin" class="section">

<h2>Admin Panel</h2>

<input id="searchUser" placeholder="Search user">

<button onclick="searchUser()">Search</button>

<div id="adminUsers"></div>

</section>

<!-- PIN MODAL -->

<div id="pinModal" class="pinModal">

<div class="pinBox">

<h3>Enter Transaction PIN</h3>

<input id="pinInput" type="password">

<button onclick="confirmPurchase()">Confirm</button>

<button onclick="closePinModal()">Cancel</button>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottomNav">

<button onclick="showSection('home')">Home</button>

<button onclick="showSection('data')">Data</button>

<button onclick="showSection('airtime')">Airtime</button>

<button onclick="showSection('fund')">Fund</button>

<button onclick="showSection('transactions')">History</button>

</div>

<script src="app.js"></script>

<script>

let purchaseType=""

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

if(id==="transactions"){
loadAllTransactions()
}

}

function openPinModal(type){

purchaseType=type

document.getElementById("pinModal").style.display="flex"

}

function closePinModal(){

document.getElementById("pinModal").style.display="none"

}

function confirmPurchase(){

const pin=document.getElementById("pinInput").value

if(purchaseType==="data"){
buyData(pin)
}

if(purchaseType==="airtime"){
buyAirtime(pin)
}

closePinModal()

}

</script>

</body>
</html>
