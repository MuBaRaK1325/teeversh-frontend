<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>

<style>

/* ================= THEMES ================= */
:root{
--primary:#6c5ce7;
--bg:#050510;
--card:#0b0b2a;
--accent:#341f97;
}
body.teeversh{--primary:#6c5ce7;--bg:#050510;--card:#0b0b2a;}


body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
display:none;
padding-bottom:120px;
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:var(--card);
}

.logo img{
width:65px;
border-radius:50%;
border:2px solid var(--primary);
cursor:pointer;
}

/* WALLET */
.walletCard{
margin:20px;
padding:25px;
border-radius:20px;
text-align:center;
background:linear-gradient(135deg,var(--primary),var(--accent));
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

/* QUICK */
.quickActions{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin:20px;
}

.quickCard{
background:var(--card);
padding:18px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.3s;
}
.quickCard:hover{
transform:scale(1.05);
}

/* CARD */
.card{
background:var(--card);
padding:15px;
border-radius:14px;
margin-top:12px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
background:#00000040;
color:white;
}

/* BUTTON */
button{
background:var(--primary);
border:none;
padding:14px;
border-radius:14px;
color:white;
margin-top:12px;
width:100%;
font-weight:bold;
}

/* PLAN GRID */
.planGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.planItem{
background:var(--card);
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
transition:0.2s;
}
.planItem:hover{
transform:scale(1.03);
}
.planItem.active{
border:2px solid var(--primary);
}

/* TRANSACTION */
.transactionCard{
background:var(--card);
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modalBox{
background:var(--card);
padding:20px;
border-radius:14px;
width:85%;
animation:fadeIn 0.3s ease;
}

/* LOADER */
.loader{
width:60px;
height:60px;
border:6px solid #222;
border-top:6px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* SUCCESS */
.successIcon{
font-size:60px;
color:var(--primary);
text-align:center;
animation:pop 0.3s ease;
}
@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

/* NAV */
.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:var(--card);
display:flex;
justify-content:space-around;
}

.bottomNav button{
background:none;
color:white;
}

</style>
</head>

<body>

<header>
<div class="logo" onclick="openModal('planModal')">
<img id="companyLogo">
</div>
<h3 id="companyName"></h3>
<div onclick="showSection('profile')">👤</div>
</header>

<!-- HOME -->
<section id="home">
<h3 id="usernameDisplay"></h3>

<div class="walletCard">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<div class="quickActions">
<div class="quickCard" onclick="showSection('fund')">💰 Fund</div>
<div class="quickCard" onclick="showSection('data')">📶 Data</div>
</div>

<div id="transactionHistory"></div>
</section>

<!-- FUND -->
<section id="fund" style="display:none">
<div class="card">
<p>Bank Name</p>
<strong id="bankName"></strong>
<p>Account Number</p>
<strong id="accountNumber"></strong>
<button onclick="copyAccount()">Copy</button>
</div>
</section>

<!-- DATA -->
<section id="data" style="display:none">
<input id="dataPhone" placeholder="Phone Number">
<div id="planList" class="planGrid"></div>
<button onclick="openPinModal('data')">Buy Data</button>
<button onclick="confirmBiometric()">Use Fingerprint</button>
</section>

<!-- PROFILE -->
<section id="profile" style="display:none">
<button onclick="openModal('passwordModal')">Change Password</button>
<button onclick="openModal('pinModalBox')">Change PIN</button>
<button onclick="toggleBiometric()">Toggle Biometric</button>
<button onclick="logout()">Logout</button>
</section>

<!-- PLAN MODAL -->
<div id="planModal" class="modal">
<div class="modalBox">
<h3>Select Plan</h3>
<div id="planListModal" class="planGrid"></div>
<button onclick="closeModal('planModal')">Close</button>
</div>
</div>

<!-- PIN -->
<div id="pinModal" class="modal">
<div class="modalBox">
<input id="pinInput" placeholder="Enter PIN">
<button onclick="startProcessing()">Confirm</button>
</div>
</div>

<!-- LOADING -->
<div id="loadingModal" class="modal">
<div class="modalBox">
<div class="loader"></div>
<p style="text-align:center;margin-top:10px;">Processing...</p>
</div>
</div>

<!-- SUCCESS -->
<div id="successModal" class="modal">
<div class="modalBox">
<div class="successIcon">✔</div>
<h3 style="text-align:center;">Success</h3>
<button onclick="closeModal('successModal')">Done</button>
</div>
</div>

<!-- RECEIPT -->
<div id="receiptModal" class="modal">
<div class="modalBox" id="receiptContent"></div>
</div>

<script src="app.js"></script>

<script>

/* THEME */
const payload=JSON.parse(atob(localStorage.getItem("token").split(".")[1]))
document.body.classList.add(payload.company)

companyName.innerText={
teeversh:"TEEVERSH DATA PLUG",
bnhabeeb:"BN HABEEB DATA HUB",
sadeeq:"SADEEQ DATA HUB"
}[payload.company]

companyLogo.src="images/"+payload.company.toUpperCase()+".png"

/* NAV */
function showSection(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

/* MODAL */
function openModal(id){document.getElementById(id).style.display="flex"}
function closeModal(id){document.getElementById(id).style.display="none"}

/* PIN */
function openPinModal(type){
purchaseType=type
openModal("pinModal")
}

/* PROCESS FLOW */
function startProcessing(){
const pin=pinInput.value
if(!pin) return alert("Enter PIN")

closeModal("pinModal")
openModal("loadingModal")

setTimeout(async()=>{
if(purchaseType==="data") await buyData(pin)

closeModal("loadingModal")
openModal("successModal")
},1500)
}

</script>

</body>
</html>
