<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTU Services</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: white;
      overflow-x: hidden;
    }
  .container {
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }
  .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      object-fit: cover;
    }
  .logoFallback {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 4px;
      font-weight: 600;
    }
  .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 32px;
    }
  .btnGroup {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
  .btn {
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }
  .btnPrimary {
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  .btnPrimary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  .btnSecondary {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }
  .btnSecondary:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
  .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 12px;
      opacity: 0.8;
    }
  .feature {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
  .footer {
      margin-top: 32px;
      font-size: 11px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="logo" class="logo" alt="Logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
    <div id="logoFallback" class="logoFallback">
      <span id="logoLetter" style="font-size: 48px; font-weight: bold;"></span>
    </div>

    <h1 id="companyName">VTU Services</h1>
    <p class="tagline">Cheap, Affordable, Fast</p>
    <p class="subtitle">Data • Airtime • Bills Payment</p>

    <div class="btnGroup">
      <a href="login.html" class="btn btnPrimary" id="loginBtn">Login</a>
      <a href="signup.html" class="btn btnSecondary">Create Account</a>
    </div>

    <div class="features">
      <div class="feature">⚡ Instant Delivery</div>
      <div class="feature">💰 Best Prices</div>
      <div class="feature">🔒 100% Secure</div>
      <div class="feature">📞 24/7 Support</div>
    </div>

    <div class="footer" id="footerText">
      © 2026 All Rights Reserved
    </div>
  </div>

  <script>
    const COMPANY_CONFIG = {
      'mayconnect-frontend.onrender.com': {
        name: 'MAYCONNECT VTU',
        logo: 'images/mayconnect-logo.png',
        letter: 'M',
        color1: '#0066cc',
        color2: '#004499',
        textColor: '#0066cc',
        loginColor: '#0066cc'
      },
      'teeversh-frontend.onrender.com': {
        name: 'TEEVERSH VTU',
        logo: 'images/teeversh-logo.png',
        letter: 'T',
        color1: '#1a0b2e',
        color2: '#2d1b4e',
        textColor: '#9333ea',
        loginColor: '#9333ea'
      },
      'sadeeq-frontend.onrender.com': {
        name: 'SADEEQ DATA HUB',
        logo: 'images/sadeeq-logo.png',
        letter: 'S',
        color1: '#064e3b',
        color2: '#065f46',
        textColor: '#059669',
        loginColor: '#059669'
      },
      'bnhabeeb-frontend.onrender.com': {
        name: 'BN HABEEB DATA HUB',
        logo: 'images/bnhabeeb-logo.png',
        letter: 'B',
        color1: '#1a1a1a',
        color2: '#2d2d2d',
        textColor: '#FFD700',
        loginColor: '#FFD700'
      },
      'localhost': {
        name: 'TEEVERSH VTU',
        logo: 'images/teeversh-logo.png',
        letter: 'T',
        color1: '#1a0b2e',
        color2: '#2d1b4e',
        textColor: '#9333ea',
        loginColor: '#9333ea'
      }
    };

    const hostname = window.location.hostname;
    const config = COMPANY_CONFIG[hostname] || COMPANY_CONFIG['teeversh-frontend.onrender.com'];

    document.title = config.name + ' - Cheap Data & Airtime';
    document.body.style.background = `linear-gradient(135deg, ${config.color1}, ${config.color2})`;
    document.getElementById('logo').src = config.logo;
    document.getElementById('logoFallback').style.background = `linear-gradient(135deg, ${config.textColor}, ${config.color2})`;
    document.getElementById('logoLetter').textContent = config.letter;
    document.getElementById('logoLetter').style.color = config.name.includes('BN HABEEB')? '#1a1a1a' : 'white';
    document.getElementById('companyName').textContent = config.name;
    document.getElementById('loginBtn').style.color = config.loginColor;
    document.getElementById('footerText').textContent = `© 2026 ${config.name}. All Rights Reserved`;

    // If user already logged in, send to dashboard
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
