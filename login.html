<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAY CONNECT - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020b1f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #2b6cff;
padding:8px;
margin-bottom:40px;
}

.card{
background:#08142c;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.title{
text-align:center;
font-size:26px;
margin-bottom:25px;
}

.inputBox{
margin-bottom:18px;
position:relative;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#020b1f;
color:white;
font-size:16px;
outline:none;
}

.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#4da3ff;
font-size:14px;
cursor:pointer;
}

.loginBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#3b78e7;
color:white;
font-size:17px;
margin-top:10px;
cursor:pointer;
}

.biometric{
margin-top:16px;
border:2px dashed #3b78e7;
padding:14px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.signup{
margin-top:15px;
border:2px solid #3b78e7;
padding:14px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
display:block;
}

</style>
</head>
<body>

<img src="logo.png" class="logo">

<div class="card">

<div class="title">Welcome Back</div>

<div class="inputBox">
<input id="username" placeholder="Username">
</div>

<div class="inputBox">
<input id="password" type="password" placeholder="Password">
<button class="showBtn" onclick="togglePassword()">Show</button>
</div>

<button class="loginBtn" onclick="login()">Login</button>

<div class="biometric">
🔐 Login with Biometrics
</div>

<a href="signup.html">
<div class="signup">
Create Account
</div>
</a>

</div>

<script src="app.js"></script>

<script>

function togglePassword(){

const pass=document.getElementById("password")

if(pass.type==="password"){
pass.type="text"
}else{
pass.type="password"
}

}

</script>

</body>
</html>
