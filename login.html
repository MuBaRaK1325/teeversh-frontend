<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAY CONNECT - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020b1f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* LOGIN SPLASH */

#loginLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020b1f;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.loaderRing{
width:70px;
height:70px;
border:6px solid #0c1a36;
border-top:6px solid #3b78e7;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #2b6cff;
padding:8px;
margin-bottom:40px;
}

.card{
background:#08142c;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.title{
text-align:center;
font-size:26px;
margin-bottom:25px;
}

.inputBox{
margin-bottom:18px;
position:relative;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#020b1f;
color:white;
font-size:16px;
outline:none;
}

.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#4da3ff;
font-size:14px;
cursor:pointer;
}

.loginBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#3b78e7;
color:white;
font-size:17px;
margin-top:10px;
cursor:pointer;
}

.biometric{
margin-top:16px;
border:2px dashed #3b78e7;
padding:16px;
border-radius:12px;
text-align:center;
cursor:pointer;
font-size:16px;
}

.signup{
margin-top:15px;
border:2px solid #3b78e7;
padding:14px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
display:block;
}

</style>
</head>

<body>

<!-- LOGIN LOADER -->

<div id="loginLoader">

<div class="loaderRing"></div>

<p style="margin-top:15px">Logging in...</p>

</div>

<img src="images/logo.png" class="logo">

<div class="card">

<div class="title">Welcome Back</div>

<div class="inputBox">
<input id="loginUsername" placeholder="Username">
</div>

<div class="inputBox">
<input id="loginPassword" type="password" placeholder="Password">
<button class="showBtn" onclick="togglePassword()">Show</button>
</div>

<button class="loginBtn" onclick="login()">Login</button>

<!-- BIOMETRIC LOGIN -->

<div class="biometric" onclick="biometricLogin()">
🔐 Login with Fingerprint / Face ID
</div>

<a href="signup.html">
<div class="signup">
Create Account
</div>
</a>

</div>

<script src="app.js"></script>

<script>

/* AUTO LOGIN IF TOKEN EXISTS */

window.onload=function(){

const token=localStorage.getItem("token")

if(token){

window.location.href="dashboard.html"

}

}

/* TOGGLE PASSWORD */

function togglePassword(){

const pass=document.getElementById("loginPassword")

if(pass.type==="password"){

pass.type="text"

}else{

pass.type="password"

}

}

/* LOGIN FUNCTION */

async function login(){

const username=document.getElementById("loginUsername").value.trim()
const password=document.getElementById("loginPassword").value.trim()

if(!username || !password){

alert("Enter username and password")
return

}

document.getElementById("loginLoader").style.display="flex"

try{

const res=await fetch("https://mayconnect-backend-1.onrender.com/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

})

const data=await res.json()

if(data.token){

/* SAVE TOKEN */

localStorage.setItem("token",data.token)

/* REDIRECT */

window.location.href="dashboard.html"

}else{

document.getElementById("loginLoader").style.display="none"

alert(data.message || "Login failed")

}

}catch(err){

document.getElementById("loginLoader").style.display="none"

alert("Network error")

}

}

/* BIOMETRIC LOGIN */

async function biometricLogin(){

const biometricEnabled=localStorage.getItem("biometric")
const token=localStorage.getItem("token")

if(biometricEnabled!=="true"){

alert("Biometric login not enabled. Enable it inside your profile first.")
return

}

if(!token){

alert("Login normally first before using biometric.")
return

}

try{

/* Trigger device biometric */

await navigator.credentials.get({
publicKey:{
challenge:new Uint8Array(32),
timeout:60000,
userVerification:"preferred"
}
})

/* success */

document.getElementById("loginLoader").style.display="flex"

setTimeout(()=>{
window.location.href="dashboard.html"
},800)

}catch(err){

alert("Biometric verification failed")

}

}

</script>

</body>
</html>
