<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEEVERSH DATA PLUG - Login</title>

<style>
body{
background:#0a0618;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Arial;
}

.card{
background:#140a2e;
padding:30px;
border-radius:20px;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#05051a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#8b5cf6;
border:none;
border-radius:10px;
color:white;
}

.biometric{
margin-top:10px;
padding:12px;
border:2px dashed #8b5cf6;
text-align:center;
cursor:pointer;
}

</style>

</head>

<body>

<div id="loginLoader" style="display:none">Loading...</div>

<img src="images/TEEVERSH.png" width="100">

<div class="card">

<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div class="biometric" onclick="biometricLogin()">
🔐 Use Fingerprint
</div>

</div>

<script src="login.js"></script>

</body>
</html>
