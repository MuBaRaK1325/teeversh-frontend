<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/theme.css">
  <script src="js/theme.js"></script>
</head>
<body class="centered">
  <div id="loginLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
    <div style="width:70px;height:70px;border:6px solid #2c0526;border-top:6px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px">Logging in...</p>
  </div>

  <div class="container">
    <div class="glass-card">
      <img id="companyLogo" class="logo" alt="Logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
      <div id="logoFallback" class="logo-fallback" style="display:none;">
        <span id="logoLetter" style="font-size: 48px; font-weight: bold;"></span>
      </div>

      <h1 class="h1 text-center" id="companyName">Welcome Back</h1>
      <p class="tagline text-center">Cheap, Affordable, Fast</p>

      <div class="flex flex-col gap-2 mt-3">
        <input id="loginUsername" class="input" placeholder="Username or Email">

        <div style="position:relative;">
          <input id="loginPassword" type="password" class="input" placeholder="Password">
          <button class="showBtn" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--accent);cursor:pointer;">Show</button>
        </div>

        <button id="loginBtn" class="btn btn-primary mt-1">Login</button>

        <button onclick="biometricLogin()" class="btn btn-ghost mt-1">
          🔐 Login with Fingerprint / Face ID
        </button>

        <a href="signup.html" class="btn btn-secondary mt-2">Create Account</a>
      </div>
    </div>
  </div>

<style>
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>

<script>
const API = "https://mayconnect-backend-1.onrender.com";
const usernameInput = document.getElementById("loginUsername");
const passwordInput = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const loader = document.getElementById("loginLoader");
const welcomeSound = new Audio("sounds/welcome.mp3");

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("token")) {
    window.location.href = "dashboard.html";
  }
});

function togglePassword(){
  if(!passwordInput) return;
  passwordInput.type = passwordInput.type === "password"? "text" : "password";
  document.querySelector(".showBtn").innerText = passwordInput.type === "password"? "Show" : "Hide";
}

loginBtn.addEventListener("click", login);

async function login(){
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();

  if(!username ||!password){
    alert("Enter username and password");
    return;
  }

  loginBtn.disabled = true;
  loader.style.display = "flex";

  try{
    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ username, password })
    });

    let data;
    try{ data = await res.json(); }catch{ throw new Error("Invalid server response"); }
    if(!res.ok) throw new Error(data.message || "Login failed");
    if(!data.token) throw new Error("No token received");

    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.username);
    if(data.is_admin) alert("Welcome Admin");

    welcomeSound.play().catch(()=>{});
    setTimeout(()=>{ window.location.href = "dashboard.html"; },600);

  }catch(err){
    console.error(err);
    alert(err.message || "Server error");
    loader.style.display = "none";
    loginBtn.disabled = false;
  }
}

async function base64URLToBuffer(base64URL) {
  const base64 = base64URL.replace(/-/g, '+').replace(/_/g, '/');
  const padLen = (4 - (base64.length % 4)) % 4;
  const padded = base64 + '='.repeat(padLen);
  const binary = atob(padded);
  const buffer = new ArrayBuffer(binary.length);
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return buffer;
}

async function bufferToBase64URL(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = '';
  for (const charCode of bytes) str += String.fromCharCode(charCode);
  const base64 = btoa(str);
  return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function biometricLogin(){
  const usernameOrEmail = usernameInput.value.trim();
  if(!usernameOrEmail) return alert("Enter your username or email first");
  if(!window.PublicKeyCredential) return alert("Biometric not supported on this device");

  loader.style.display="flex";

  try{
    const startRes = await fetch(API + "/api/auth/webauthn/login-start", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email: usernameOrEmail })
    });

    if(!startRes.ok){
      const err = await startRes.json();
      throw new Error(err.error || "No biometric registered for this account");
    }

    const options = await startRes.json();
    options.challenge = await base64URLToBuffer(options.challenge);
    if(options.allowCredentials){
      options.allowCredentials = await Promise.all(
        options.allowCredentials.map(async cred => ({
        ...cred,
          id: await base64URLToBuffer(cred.id)
        }))
      );
    }

    const credential = await navigator.credentials.get({ publicKey: options });

    const finishRes = await fetch(API + "/api/auth/webauthn/login-finish", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        email: usernameOrEmail,
        id: credential.id,
        rawId: await bufferToBase64URL(credential.rawId),
        response: {
          authenticatorData: await bufferToBase64URL(credential.response.authenticatorData),
          clientDataJSON: await bufferToBase64URL(credential.response.clientDataJSON),
          signature: await bufferToBase64URL(credential.response.signature),
          userHandle: credential.response.userHandle? await bufferToBase64URL(credential.response.userHandle) : null,
        },
        type: credential.type,
        clientExtensionResults: credential.getClientExtensionResults()
      })
    });

    if(!finishRes.ok){
      const err = await finishRes.json();
      throw new Error(err.error || "Authentication failed");
    }

    const { token, username, is_admin } = await finishRes.json();
    localStorage.setItem("token", token);
    localStorage.setItem("username", username);
    if(is_admin) alert("Welcome Admin");
    welcomeSound.play().catch(()=>{});
    setTimeout(()=>{ window.location.href = "dashboard.html"; },600);

  }catch(e){
    console.error(e);
    loader.style.display="none";
    if (e.name === 'NotAllowedError') {
      alert('Fingerprint cancelled or failed');
    } else {
      alert('Biometric login failed: ' + e.message);
    }
  }
}
</script>
</body>
</html>
