<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SADEEQ DATA HUB - Login</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#031a0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #22c55e;
padding:8px;
margin-bottom:40px;
box-shadow:0 0 20px #22c55e;
}

.card{
background:#052e1c;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
}

.inputBox{margin-bottom:18px;position:relative;}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#02140c;
color:white;
}

.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#4ade80;
cursor:pointer;
}

.loginBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
margin-top:10px;
}

.biometric{
margin-top:16px;
border:2px dashed #22c55e;
padding:16px;
border-radius:12px;
text-align:center;
}

.signup{
margin-top:15px;
border:2px solid #22c55e;
padding:14px;
border-radius:12px;
text-align:center;
}

</style>
</head>

<body>

<img src="images/SADEEQ.png" class="logo">

<div class="card">

<div class="inputBox"><input id="loginUsername" placeholder="Username"></div>

<div class="inputBox">
<input id="loginPassword" type="password" placeholder="Password">
<button class="showBtn" onclick="togglePassword()">Show</button>
</div>

<button id="loginBtn" class="loginBtn">Login</button>

<div class="biometric" onclick="biometricLogin()">🔐 Fingerprint Login</div>

<div class="signup"><a href="signup.html">Create Account</a></div>

</div>

<script src="login.js"></script>

<script>
function togglePassword(){
const i=document.getElementById("loginPassword")
const b=document.querySelector(".showBtn")
if(i.type==="password"){i.type="text";b.innerText="Hide"}
else{i.type="password";b.innerText="Show"}
}
</script>

</body>
</html>
