<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEEVERSH DATA PLUG - Sign Up</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#9333ea">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0b2e, #2d1b4e);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
   .container { max-width: 28rem; width: 100%; text-align: center; }
   .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
   .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      object-fit: cover;
    }
   .h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
   .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 4px;
      font-weight: 600;
    }
   .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
    }
   .input::placeholder { color: rgba(255, 255, 255, 0.7); }
   .input:focus {
      outline: none;
      border-color: #9333ea;
      background: rgba(255, 255, 255, 0.15);
    }
   .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
    }
   .btn-primary {
      background: white;
      color: #9333ea;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
   .btn-primary:hover { transform: translateY(-2px); }
   .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
   .showBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9333ea;
      cursor: pointer;
      font-weight: 600;
    }
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="signupLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
    <div style="width:70px;height:70px;border:6px solid #2c0526;border-top:6px solid #9333ea;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px">Creating account...</p>
  </div>

  <div class="container">
    <div class="glass-card">
      <img src="images/TEEVERSH.png" class="logo" alt="Logo">
      <h1 class="h1">Create Account</h1>
      <p class="tagline">Cheap, Affordable, Fast</p>

      <div id="error" style="color:#f87171;text-align:center;margin-bottom:12px;font-size:14px;"></div>

      <input id="username" class="input" placeholder="Username">
      <input id="email" class="input" placeholder="Email" type="email">
      <input id="phone" class="input" placeholder="Phone e.g 08012345678" type="tel">

      <div style="position:relative;">
        <input id="password" type="password" class="input" placeholder="Password">
        <button class="showBtn" onclick="toggleField('password',this)">Show</button>
      </div>

      <div style="position:relative;">
        <input id="pin" type="password" class="input" placeholder="Transaction PIN (4 digits)" maxlength="4" inputmode="numeric">
        <button class="showBtn" onclick="toggleField('pin',this)">Show</button>
      </div>

      <button id="signupBtn" class="btn btn-primary">Create Account</button>
      <a href="login.html" class="btn btn-secondary">Already have an account? Login</a>
    </div>
  </div>

<script>
const API = "https://mayconnect-backend-1.onrender.com";
const btn = document.getElementById("signupBtn");
const loader = document.getElementById("signupLoader");
const errorDiv = document.getElementById("error");

if (localStorage.getItem("token")) window.location.href = "dashboard.html";

function toggleField(id,btn){
  const i = document.getElementById(id);
  if(i.type==="password"){i.type="text";btn.innerText="Hide"}
  else{i.type="password";btn.innerText="Show"}
}

btn.onclick = async () => {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const pin = document.getElementById("pin").value;
  errorDiv.innerText = "";
  if (!username ||!email ||!phone ||!password ||!pin) {
    errorDiv.innerText = "All fields required";
    return;
  }
  if (pin.length!== 4 || isNaN(pin)) {
    errorDiv.innerText = "PIN must be 4 digits";
    return;
  }
  btn.disabled = true;
  btn.innerText = "Creating...";
  loader.style.display = "flex";
  try {
    const res = await fetch(API + "/api/signup", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ username, email, phone, password, pin, company: "teeversh" })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "dashboard.html";
    } else {
      errorDiv.innerText = data.message || "Signup failed";
      btn.disabled = false;
      btn.innerText = "Create Account";
      loader.style.display = "none";
    }
  } catch (e) {
    errorDiv.innerText = "Network error. Try again.";
    btn.disabled = false;
    btn.innerText = "Create Account";
    loader.style.display = "none";
  }
};
</script>
</body>
</html>
