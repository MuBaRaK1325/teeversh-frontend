<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEEVERSH - Signup</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#03121a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #b222c5;
padding:8px;
margin-bottom:40px;
box-shadow:0 0 20px #b222c5;
}

.card{
background:#2e052a;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
box-shadow:0 0 30px rgba(184, 34, 197, 0.2);
}

.title{text-align:center;font-size:26px;margin-bottom:25px;}

.inputBox{margin-bottom:18px;position:relative;}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#120214;
color:white;
}

.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#d24ade;
cursor:pointer;
}

.signupBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#a522c5;
color:white;
margin-top:10px;
cursor:pointer;
}

.signupBtn:disabled{
opacity:0.6;
cursor:not-allowed;
}

.loginLink{
margin-top:16px;
border:2px solid #a522c5;
padding:14px;
border-radius:12px;
text-align:center;
}

a{color:white;text-decoration:none;}

.error{color:#ff6b6b;text-align:center;margin-bottom:10px;font-size:14px;}

</style>
</head>

<body>

<img src="images/TEEVERSH.png" class="logo">

<div class="card">

<div class="title">Create Account</div>
<div id="error" class="error"></div>

<div class="inputBox"><input id="username" placeholder="Username"></div>
<div class="inputBox"><input id="email" placeholder="Email" type="email"></div>
<div class="inputBox"><input id="phone" placeholder="Phone e.g 08012345678" type="tel"></div>

<div class="inputBox">
<input id="password" type="password" placeholder="Password">
<button class="showBtn" onclick="toggleField('password',this)">Show</button>
</div>

<div class="inputBox">
<input id="pin" type="password" placeholder="PIN" maxlength="4" inputmode="numeric">
<button class="showBtn" onclick="toggleField('pin',this)">Show</button>
</div>

<button id="signupBtn" class="signupBtn">Create Account</button>

<a href="login.html"><div class="loginLink">Already have account</div></a>

</div>

<script>
const API = "https://mayconnect-backend-1.onrender.com";

function toggleField(id,btn){
  const i=document.getElementById(id)
  if(i.type==="password"){i.type="text";btn.innerText="Hide"}
  else{i.type="password";btn.innerText="Show"}
}

document.getElementById("signupBtn").onclick = async () => {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const pin = document.getElementById("pin").value;
  const errorDiv = document.getElementById("error");
  const btn = document.getElementById("signupBtn");

  errorDiv.innerText = "";

  if (!username || !email || !phone || !password || !pin) {
    errorDiv.innerText = "All fields required";
    return;
  }
  if (pin.length !== 4 || isNaN(pin)) {
    errorDiv.innerText = "PIN must be 4 digits";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating...";

  try {
    const res = await fetch(API + "/api/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        username, 
        email, 
        phone, 
        password, 
        pin, 
        company: "teeversh" 
      })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "dashboard.html";
    } else {
      errorDiv.innerText = data.message || "Signup failed";
      btn.disabled = false;
      btn.innerText = "Create Account";
    }
  } catch (e) {
    errorDiv.innerText = "Network error. Try again.";
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
};
</script>

</body>
</html>
