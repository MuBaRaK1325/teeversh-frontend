<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEEVERSH DATA PLUG - Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0618;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* LOGO */
.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #8b5cf6;
padding:8px;
margin-bottom:40px;
box-shadow:0 0 20px #8b5cf6;
}

/* CARD */
.card{
background:#140a2e;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
box-shadow:0 0 30px rgba(139,92,246,0.2);
}

.title{
text-align:center;
font-size:26px;
margin-bottom:25px;
}

/* INPUT */
.inputBox{
margin-bottom:18px;
position:relative;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#05051a;
color:white;
font-size:16px;
outline:none;
}

/* SHOW BUTTON */
.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#a78bfa;
cursor:pointer;
}

/* BUTTON */
.signupBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#8b5cf6;
color:white;
font-size:17px;
margin-top:10px;
cursor:pointer;
}

.signupBtn:disabled{
opacity:0.6;
cursor:not-allowed;
}

/* LINK */
.loginLink{
margin-top:16px;
border:2px solid #8b5cf6;
padding:14px;
border-radius:12px;
text-align:center;
}

a{
color:white;
text-decoration:none;
display:block;
}

</style>

</head>

<body>

<img src="images/TEEVERSH.png" class="logo">

<div class="card">

<div class="title">Create Account</div>

<div class="inputBox">
<input id="username" placeholder="Username">
</div>

<div class="inputBox">
<input id="email" placeholder="Email">
</div>

<div class="inputBox">
<input id="password" type="password" placeholder="Password">
<button class="showBtn" onclick="toggleField('password',this)">Show</button>
</div>

<div class="inputBox">
<input id="pin" type="password" placeholder="Transaction PIN (4 digits)" maxlength="4">
<button class="showBtn" onclick="toggleField('pin',this)">Show</button>
</div>

<button id="signupBtn" class="signupBtn">Create Account</button>

<a href="login.html">
<div class="loginLink">
Already have account
</div>
</a>

</div>

<script src="signup.js"></script>

<script>
function toggleField(id,btn){
const input=document.getElementById(id)
if(input.type==="password"){
input.type="text"
btn.innerText="Hide"
}else{
input.type="password"
btn.innerText="Show"
}
}
</script>

</body>
</html>
