<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Purchase Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="top-bar">
  <span onclick="history.back()">←</span>
  <h2>Purchase Data</h2>
</div>

<div class="networks">
  <div class="network-logo"><img src="mtn.png" /></div>
</div>

<div class="phone-box">
  <input id="phone" placeholder="Enter a phone number" />
</div>

<div class="tabs">
  <span class="active">SME</span>
  <span>GIFTING</span>
</div>

<!-- PLANS GRID -->
<div id="plansGrid" class="plans-grid"></div>

<button id="confirmOrderBtn" class="confirm-btn hidden" onclick="confirmOrder()">Confirm Order</button>
<button id="setPinBtn" class="confirm-btn" onclick="openSetPinFromMore()">Set PIN</button>

<!-- PIN MODAL (used for purchase or set PIN) -->
<div id="pinModal" class="hidden modal">
  <div class="modal-content">
    <h3 id="pinTitle">Enter PIN</h3>
    <div class="pin-inputs">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
    </div>
    <button id="pinActionBtn" class="primary-btn" onclick="submitPin()">Pay</button>
    <button onclick="closePinModal()" class="secondary-btn">Cancel</button>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="modal hidden">
  <div class="modal-content">
    <h3>Receipt</h3>
    <div id="receiptBody"></div>
    <button onclick="receiptModal.classList.add('hidden')" class="primary-btn">Close</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
